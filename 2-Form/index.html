<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="page">
        <section class="register" aria-labelledby="register-title">
            <h1 class="register__title" id="register-title">Регистрация</h1>

            <p class="register__text">
                Уже есть аккаунт?
                <a class="register__link" href="#">Войти</a>
            </p>

            <form class="register__form" action="#" method="post">
                <div class="register__field">
                    <label class="visually-hidden" for="company">Компания</label>
                    <input
                        class="register__input"
                        type="text"
                        id="company"
                        name="company"
                        placeholder="Моя компания"
                        required
                    />
                </div>

                <fieldset class="register__group">
                    <legend class="visually-hidden">Личные данные</legend>

                    <div class="register__field">
                        <label class="visually-hidden" for="first-name">Имя</label>
                        <input
                            class="register__input"
                            type="text"
                            id="first-name"
                            name="first_name"
                            placeholder="Имя"
                            required
                        />
                    </div>

                    <div class="register__field">
                        <label class="visually-hidden" for="last-name">Фамилия</label>
                        <input
                            class="register__input"
                            type="text"
                            id="last-name"
                            name="last_name"
                            placeholder="Фамилия"
                            required
                        />
                    </div>
                </fieldset>

                <div class="register__field">
                    <label class="visually-hidden" for="email">E-mail</label>
                    <input
                        class="register__input"
                        type="email"
                        id="email"
                        name="email"
                        placeholder="E-mail"
                        required
                    />
                </div>

                <button class="register__button" type="submit">Зарегистрироваться</button>

                <div class="register__agreement">
                    <input
                        class="register__checkbox"
                        type="checkbox"
                        id="terms"
                        name="terms"
                        required
                    />
                    <label class="register__agreement-label" for="terms">
                        Я прочитал и принимаю
                    </label>
                    <a class="register__link" href="#">Условия использования</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
